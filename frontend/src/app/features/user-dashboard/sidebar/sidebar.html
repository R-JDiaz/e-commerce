<aside class="sidebar">
  <div class="header">
    <div>
      <p class="eyebrow">Cart</p>
      <h2>Shopping Cart</h2>
    </div>
    <span class="count">{{ totalItems$ | async }}</span>
  </div>

  <ng-container *ngIf="cartItems$ | async as cartItems">
    <div class="items" *ngIf="cartItems.length; else empty">
      <div class="item" *ngFor="let item of cartItems; trackBy: trackByProductId">
        <div class="info">
          <img [src]="item.product.image_url" [alt]="item.product.name" />
          <div class="details">
            <p>{{ item.product.name }}</p>
            <small>&#8369;{{ item.product.price }}</small>
          </div>
        </div>

        <div class="controls">
          <div class="quantity">
            <button type="button" [disabled]="item.quantity <= 1" (click)="updateQuantity(item.product.id, item.quantity - 1)">-</button>
            <span>{{ item.quantity }}</span>
            <button type="button" (click)="updateQuantity(item.product.id, item.quantity + 1)">+</button>
          </div>

          <button type="button" class="remove" (click)="removeItem(item.product.id)">&times;</button>
        </div>
      </div>
    </div>

    <div class="footer" *ngIf="cartItems.length">
      <div class="summary">
        <span>Total</span>
        <strong>&#8369;{{ (totalPrice$ | async) | number:'1.2-2' }}</strong>
      </div>

      <button type="button" (click)="checkout()">Checkout</button>
    </div>
  </ng-container>

  <ng-template #empty>
    <p class="empty">Cart is empty</p>
  </ng-template>
</aside>
