<app-navigation context="orders" (logout)="logout()"></app-navigation>

<div class="list" *ngIf="!isLoading && !errorMessage">

  <header class="topbar">
      <div>
        <p class="eyebrow">Orders</p>
        <h1>Order history</h1>
      </div>

      <button type="button" class="back" (click)="backToShop()">
        Back to shop
      </button>
    </header>
  <app-order-card
    *ngFor="let order of orders$ | async"
    [order]="order"
    (received)="markReceived($event)">
  </app-order-card>

</div>
