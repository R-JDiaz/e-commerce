<div class="product-display-overlay">
  <div class="product-display modal-style">

    <div class="top-bar">
      <button class="back-button" (click)="onBack()">
        ← Back
      </button>
    </div>

    <div class="display-scroll">

      <!-- LOADING -->
      <ng-container *ngIf="isLoading; else loadedState">

        <div class="state-wrapper">
          <div class="state-card loading-card">

            <div class="loading-image shimmer"></div>

            <div class="loading-content">
              <div class="loading-line shimmer large"></div>
              <div class="loading-line shimmer"></div>
              <div class="loading-line shimmer short"></div>

              <div class="loading-price shimmer"></div>

              <div class="loading-button shimmer"></div>
            </div>

          </div>
        </div>

      </ng-container>

      <!-- LOADED -->
      <ng-template #loadedState>

        <!-- PRODUCT EXISTS -->
        <ng-container *ngIf="product; else emptyState">

          <div class="display-content">

            <div class="image-section">

              <div class="image-frame">

                <img
                  *ngIf="currentImageUrl"
                  [src]="currentImageUrl"
                  [alt]="product.name">

                <div
                  *ngIf="!currentImageUrl"
                  class="image-empty">

                  No image available
                </div>

                <div
                  class="image-controls"
                  *ngIf="hasMultipleImages">

                  <button
                    class="nav"
                    (click)="previousImage()">

                    &#8249;
                  </button>

                  <button
                    class="nav"
                    (click)="nextImage()">

                    &#8250;
                  </button>
                </div>
              </div>

              <div
                class="image-dots"
                *ngIf="hasMultipleImages">

                <button
                  *ngFor="let image of images; let i = index"
                  class="dot"
                  [class.active]="i === activeImageIndex"
                  (click)="selectImage(i)">
                </button>

              </div>
            </div>

            <div class="details-section">

              <h3>{{ product.name }}</h3>

              <p class="description">
                {{ product.description }}
              </p>

              <div class="price-row">

                <strong>
                  {{ product.price | currency:'PHP':'symbol':'1.2-2' }}
                </strong>

                <span *ngIf="product.stock > 0; else outOfStock">
                  {{ product.stock }} in stock
                </span>

                <ng-template #outOfStock>
                  <span class="out">
                    Out of Stock
                  </span>
                </ng-template>

              </div>

              <div class="quantity-row">

                <label for="quantity">
                  Quantity:
                </label>

                <input
                  id="quantity"
                  type="number"
                  [(ngModel)]="quantity"
                  [max]="product.stock"
                  min="1" />

              </div>

              <button
                class="add-to-cart"
                [disabled]="product.stock === 0"
                (click)="addToCart(product, quantity)">

                Add to Cart
              </button>

            </div>

          </div>

        </ng-container>

      </ng-template>

      <!-- EMPTY -->
      <ng-template #emptyState>

        <div class="state-wrapper">

          <div class="state-card empty-card">

            <div class="empty-icon">
              ☕
            </div>

            <h2>No Product Selected</h2>

            <p>
              Browse the catalog and select a product
              to view full details, images, pricing,
              and stock availability.
            </p>

            <button
              class="back-button secondary"
              (click)="onBack()">

              Browse Products
            </button>

          </div>

        </div>

      </ng-template>

    </div>
  </div>
</div>
