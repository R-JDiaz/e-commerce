<div class="products">
  <app-cart></app-cart>

  <section class="hero">
    <div class="hero-copy">
      <h1>Products</h1>
      <p class="lede">
        Browse the current menu, narrow it by category, and jump straight into the items that matter.
      </p>
    </div>

    <!-- 🔥 Use async once (clean + efficient) -->
    <ng-container *ngIf="filteredProducts$ | async as products">

      <div class="hero-metrics">
        <div class="metric">
          <span class="metric-value">{{ products.length }}</span>
          <span class="metric-label">Visible items</span>
        </div>

        <div class="metric">
          <span class="metric-value">{{ categories.length }}</span>
          <span class="metric-label">Categories</span>
        </div>

        <div class="metric">
          <span class="metric-value">
            {{ getCategoryLabel(selectedCategory) }}
          </span>
          <span class="metric-label">Active filter</span>
        </div>
      </div>

    </ng-container>
  </section>

  <div class="filters">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="onSearch()"
      placeholder="Search products..."
      class="search"
    />

    <select
      [(ngModel)]="selectedCategory"
      (change)="onCategoryChange($any($event.target).value)"
      class="select"
    >
      <option value="all">All Categories</option>
      <option *ngFor="let c of categories" [value]="c.name">
        {{ c.name }}
      </option>
    </select>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading">
    Loading products...
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>

  <!-- Product Grid -->
  <ng-container *ngIf="filteredProducts$ | async as products">

    <div class="grid" *ngIf="!isLoading">
      <app-product-card
        *ngFor="let product of products"
        [product]="product"
        (add)="addToCart.emit($event)">
      </app-product-card>
    </div>

  </ng-container>
</div>
