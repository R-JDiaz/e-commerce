<app-navigation context="checkout" (logout)="logout()"></app-navigation>

<main class="checkout-page">
  <section class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Checkout</p>
        <h1>Complete your order</h1>
      </div>

      <button type="button" class="back" (click)="backToDashboard()">Back to shop</button>
    </header>

    <div class="layout">
      <form class="form-panel" [formGroup]="checkoutForm" (ngSubmit)="submitOrder()">
        <div class="section-title">
          <h2>Shipping address</h2>
        </div>

        <div class="grid two-up">
          <label>
            <span>Full name</span>
            <input type="text" formControlName="fullName" placeholder="Juan Dela Cruz">
          </label>

          <label>
            <span>Phone</span>
            <input type="tel" formControlName="phone" placeholder="09XX XXX XXXX">
          </label>
        </div>

        <label>
          <span>Email</span>
          <input type="email" formControlName="email" placeholder="name@example.com">
        </label>

        <label>
          <span>Address line 1</span>
          <input type="text" formControlName="addressLine1" placeholder="Street, building, house number">
        </label>

        <label>
          <span>Address line 2</span>
          <input type="text" formControlName="addressLine2" placeholder="Apartment, suite, unit, etc.">
        </label>

        <div class="grid three-up">
          <label>
            <span>City</span>
            <input type="text" formControlName="city" placeholder="Manila">
          </label>

          <label>
            <span>State / Province</span>
            <input type="text" formControlName="state" placeholder="Metro Manila">
          </label>

          <label>
            <span>Postal code</span>
            <input type="text" formControlName="postalCode" placeholder="1000">
          </label>
        </div>

        <div class="section-title">
          <h2>Payment method</h2>
        </div>

        <div class="payment-methods">
          <label *ngFor="let method of paymentMethods" class="method">
            <input type="radio" formControlName="paymentMethod" [value]="method.value">
            <span>{{ method.label }}</span>
          </label>
        </div>

        <div class="card-details" *ngIf="checkoutForm.value.paymentMethod === 'card'">
          <div class="grid">
            <label>
              <span>Name on card</span>
              <input type="text" formControlName="cardName" placeholder="Juan Dela Cruz">
            </label>

            <label>
              <span>Card number</span>
              <input type="text" formControlName="cardNumber" placeholder="1234 5678 9012 3456">
            </label>
          </div>

          <div class="grid two-up">
            <label>
              <span>Expiry date</span>
              <input type="text" formControlName="expiryDate" placeholder="MM/YY">
            </label>

            <label>
              <span>CVV</span>
              <input type="password" formControlName="cvv" placeholder="123">
            </label>
          </div>
        </div>

        <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Placing order...' : 'Place order' }}
        </button>
      </form>

      <aside class="summary-panel">
        <div class="section-title">
          <h2>Order summary</h2>
        </div>

        <div class="items">
          <div class="item" *ngFor="let item of cartItems">
            <img [src]="item.product.image_url" [alt]="item.product.name">
            <div class="meta">
              <strong>{{ item.product.name }}</strong>
              <span>Qty {{ item.quantity }}</span>
            </div>
            <span class="price">&#8369;{{ (item.product.price * item.quantity).toFixed(2) }}</span>
          </div>
        </div>

        <div class="totals">
          <div><span>Subtotal</span><strong>&#8369;{{ subtotal.toFixed(2) }}</strong></div>
          <div><span>Shipping</span><strong>Free</strong></div>
          <div class="grand-total"><span>Total</span><strong>&#8369;{{ total.toFixed(2) }}</strong></div>
        </div>
      </aside>
    </div>
  </section>
</main>
