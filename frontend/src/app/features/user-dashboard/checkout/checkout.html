<app-navigation context="checkout" (logout)="logout()"></app-navigation>

<main class="checkout-page">
  <section class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Checkout</p>
        <h1>Complete your order</h1>
      </div>

      <button type="button" class="back" (click)="backToDashboard()">Back to shop</button>
    </header>

    <app-checkout-summary
      [cartItems]="cartItems"
      [subtotal]="subtotal"
      [totalQuantity]="totalQuantity"
      [total]="total"
      (quantityChange)="adjustQuantity($event.productId, $event.delta)"
      (removeItem)="removeItem($event)"
    ></app-checkout-summary>

    <form class="form-panel" [formGroup]="checkoutForm" (ngSubmit)="submitOrder()">
      <app-checkout-shipping
        [checkoutForm]="checkoutForm"
        [isOpen]="isShippingOpen"
        (toggled)="toggleShipping()"
      ></app-checkout-shipping>

      <div class="payment-panel">
        <div class="section-title">
          <h2>Payment</h2>
          <p>Cash on delivery only.</p>
        </div>

        <div class="cash-panel">
          <label>
            <span>Cash amount</span>
            <input
              type="number"
              min="0"
              step="0.01"
              formControlName="cashAmount"
              placeholder="Enter cash amount"
            >
          </label>

          <div class="cash-note">
            <strong>Change due:</strong>
            <span>&#8369;{{ changeDue.toFixed(2) }}</span>
          </div>
        </div>
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Placing order...' : 'Place order' }}
      </button>
    </form>
  </section>
</main>
