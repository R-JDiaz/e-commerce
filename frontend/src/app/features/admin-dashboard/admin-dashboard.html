<div class="admin-shell">
  <app-navigation context="admin" (logout)="logout()"></app-navigation>

  <div class="layout">
    <aside class="sidebar">
      <button [class.active]="activeSection === 'analytics'" (click)="setSection('analytics')">Analytics</button>
      <button [class.active]="activeSection === 'products'" (click)="setSection('products')">Products</button>
      <button [class.active]="activeSection === 'orders'" (click)="setSection('orders')">Orders</button>
      <button [class.active]="activeSection === 'users'" (click)="setSection('users')">Users</button>
      <button [class.active]="activeSection === 'settings'" (click)="setSection('settings')">Settings</button>
      <button [class.active]="activeSection === 'site-links'" (click)="setSection('site-links')">Footer Links</button>
    </aside>

    <main class="content">
      <app-admin-analytics
        *ngIf="activeSection === 'analytics'"
        [totalSales]="totalSales"
        [ordersToday]="ordersToday"
        [activeUsers]="activeUsers"
        [avgOrderValue]="avgOrderValue">
      </app-admin-analytics>

      <app-admin-products
        *ngIf="activeSection === 'products'"
        [products]="products"
        [isLoading]="isLoading"
        [errorMessage]="errorMessage"
        (refreshRequested)="reloadProducts()">
      </app-admin-products>

      <app-admin-orders
        *ngIf="activeSection === 'orders'"
        [orders]="orders"
        (statusChange)="updateOrderStatus($event.id, $event.status)">
      </app-admin-orders>

      <app-admin-users
        *ngIf="activeSection === 'users'"
        (statusChange)="updateUserStatus($event.id, $event.status)">
      </app-admin-users>

      <app-admin-settings
        *ngIf="activeSection === 'settings'">
      </app-admin-settings>

      <app-admin-site-links
        *ngIf="activeSection === 'site-links'">
      </app-admin-site-links>
    </main>
  </div>
</div>
