<section class="panel">
  <div class="panel-head">
    <div>
      <p class="eyebrow">Overview</p>
      <h2>Analytics</h2>
      <p>Track sales, demand, and store momentum from a single dashboard surface.</p>
    </div>
  </div>

  <div class="featured-shell" *ngIf="data$ | async as data">
    <article class="featured-card">
      <div class="featured-copy">
        <p class="label">Featured metric</p>
        <h3>{{ getSelectedMetric().label }}</h3>
        <p class="description">{{ getSelectedMetric().description }}</p>
      </div>

      <div class="featured-value">
        <strong>{{ formatMetricValue(data) }}</strong>
        <small>{{ getMetricDelta(data) }}</small>
      </div>

      <div class="metric-switcher" role="tablist" aria-label="Featured metric selector">
        <button
          *ngFor="let metric of featuredMetrics"
          type="button"
          class="metric-pill"
          [class.active]="selectedMetric === metric.key"
          (click)="selectMetric(metric.key)">
          <span>{{ metric.label }}</span>
          <small>{{ metric.helper }}</small>
        </button>
      </div>
    </article>

    <div class="charts">
      <div class="chart-box">
        <h3>Sales Overview</h3>
        <canvas id="salesChart"></canvas>
      </div>

      <div class="chart-box">
        <h3>Orders Breakdown</h3>
        <canvas id="ordersChart"></canvas>
      </div>
    </div>
  </div>
</section>
