<section class="panel">
  <h2>Analytics</h2>

  <div class="grid">
    <article class="card">
      <span class="label">Total Sales</span>
      <strong>&#8369;{{ totalSales.toFixed(2) }}</strong>
    </article>
    <article class="card">
      <span class="label">Orders Today</span>
      <strong>{{ ordersToday }}</strong>
    </article>
    <article class="card">
      <span class="label">Active Users</span>
      <strong>{{ activeUsers }}</strong>
    </article>
    <article class="card">
      <span class="label">Avg. Order Value</span>
      <strong>&#8369;{{ avgOrderValue.toFixed(2) }}</strong>
    </article>
  </div>
</section>
