<div class="min-h-screen bg-gradient-to-br from-cream via-beige to-soft-orange flex items-center justify-center p-4">
  <div class="w-full max-w-4xl bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl overflow-hidden">
    <div class="grid grid-cols-1 lg:grid-cols-2">
      <!-- Left Side - Branding -->
      <div class="bg-brown/20 p-12 flex flex-col justify-center items-center text-center lg:text-left">
        <h1 class="text-4xl lg:text-5xl font-bold text-brown mb-6">Welcome Back</h1>
        <p class="text-xl text-brown/80 mb-8">Sign in to your account to continue your coffee journey</p>
        <div class="space-y-4">
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
              <svg class="w-6 h-6 text-brown" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
            </div>
            <span class="text-brown">Premium Quality</span>
          </div>
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
              <svg class="w-6 h-6 text-brown" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
            </div>
            <span class="text-brown">Fast Delivery</span>
          </div>
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
              <svg class="w-6 h-6 text-brown" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            </div>
            <span class="text-brown">Loyalty Rewards</span>
          </div>
        </div>
      </div>

      <!-- Right Side - Login Form -->
      <div class="p-12">
        <div class="mb-8">
          <div class="flex justify-center mb-6">
            <div class="flex bg-white/20 rounded-lg p-1">
              <button
                (click)="loginType = 'user'"
                [class.active]="loginType === 'user'"
                class="px-6 py-2 rounded-md transition-all duration-300">
                Customer
              </button>
              <button
                (click)="loginType = 'admin'"
                [class.active]="loginType === 'admin'"
                class="px-6 py-2 rounded-md transition-all duration-300">
                Admin
              </button>
            </div>
          </div>
          <h2 class="text-3xl font-bold text-brown text-center mb-2">
            {{ loginType === 'user' ? 'Customer' : 'Admin' }} Login
          </h2>
          <p class="text-brown/70 text-center">Enter your credentials to access your account</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-brown mb-2">Email Address</label>
            <input
              type="email"
              id="email"
              [(ngModel)]="email"
              name="email"
              required
              class="w-full px-4 py-3 bg-white/20 backdrop-blur-sm border border-white/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-soft-orange focus:border-transparent transition-all duration-300"
              placeholder="Enter your email">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-brown mb-2">Password</label>
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              required
              class="w-full px-4 py-3 bg-white/20 backdrop-blur-sm border border-white/30 rounded-xl focus:outline-none focus:ring-2 focus:ring-soft-orange focus:border-transparent transition-all duration-300"
              placeholder="Enter your password">
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center">
              <input type="checkbox" class="rounded border-white/30 text-soft-orange focus:ring-soft-orange">
              <span class="ml-2 text-sm text-brown">Remember me</span>
            </label>
            <a href="#" class="text-sm text-soft-orange hover:text-soft-orange/80 transition-colors">Forgot password?</a>
          </div>

          <button
            type="submit"
            [disabled]="isLoading"
            class="w-full bg-brown text-white py-3 px-4 rounded-xl hover:bg-brown/80 transition-all duration-300 transform hover:scale-105 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="isLoading" class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
            {{ isLoading ? 'Signing In...' : 'Sign In' }}
          </button>
        </form>

        <div *ngIf="errorMessage" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">
          {{ errorMessage }}
        </div>

        <div class="mt-6 text-center">
          <p class="text-brown/70">Don't have an account?
            <a href="#" class="text-soft-orange hover:text-soft-orange/80 transition-colors font-medium">Sign up</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
