<!-- Search and Filter -->
<div class="mb-8">
  <div class="flex flex-col md:flex-row gap-4 mb-6">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="onSearch()"
      placeholder="Search products..."
      class="flex-1 px-4 py-3 bg-white rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-soft-orange">
    <select
      [(ngModel)]="selectedCategory"
      (change)="onCategoryChange($any($event.target).value)"
      class="px-4 py-3 bg-white rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-soft-orange">
      <option value="all">All Categories</option>
      <option value="coffee">Coffee</option>
      <option value="soda">Soda Drinks</option>
      <option value="food">Food Meals</option>
      <option value="dessert">Desserts</option>
    </select>
  </div>

  <!-- Category Tabs -->
  <div class="flex space-x-4 mb-6 overflow-x-auto">
    <button
      [class.active]="selectedCategory === 'all'"
      (click)="onCategoryChange('all')"
      class="px-6 py-2 bg-white text-brown rounded-full hover:bg-soft-orange hover:text-white transition-colors whitespace-nowrap">
      All
    </button>
    <button
      [class.active]="selectedCategory === 'coffee'"
      (click)="onCategoryChange('coffee')"
      class="px-6 py-2 bg-white text-brown rounded-full hover:bg-soft-orange hover:text-white transition-colors whitespace-nowrap">
      Coffee
    </button>
    <button
      [class.active]="selectedCategory === 'soda'"
      (click)="onCategoryChange('soda')"
      class="px-6 py-2 bg-white text-brown rounded-full hover:bg-soft-orange hover:text-white transition-colors whitespace-nowrap">
      Soda Drinks
    </button>
    <button
      [class.active]="selectedCategory === 'food'"
      (click)="onCategoryChange('food')"
      class="px-6 py-2 bg-white text-brown rounded-full hover:bg-soft-orange hover:text-white transition-colors whitespace-nowrap">
      Food Meals
    </button>
    <button
      [class.active]="selectedCategory === 'dessert'"
      (click)="onCategoryChange('dessert')"
      class="px-6 py-2 bg-white text-brown rounded-full hover:bg-soft-orange hover:text-white transition-colors whitespace-nowrap">
      Desserts
    </button>
  </div>
</div>

<!-- Loading/Error States -->
<div *ngIf="isLoading" class="flex justify-center items-center py-12">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brown"></div>
</div>

<div *ngIf="errorMessage" class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
  {{ errorMessage }}
</div>

<!-- Products Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="!isLoading">
  <div *ngFor="let product of filteredProducts" class="bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
    <img [src]="product.image" [alt]="product.name" class="w-full h-48 object-cover">
    <div class="p-6">
      <div class="flex justify-between items-start mb-2">
        <h3 class="text-xl font-semibold text-brown">{{ product.name }}</h3>
        <div class="flex text-soft-orange">
          <span *ngFor="let star of [1,2,3,4,5]" class="text-sm">
            {{ getStarRating(product.rating, star) ? '★' : (star <= product.rating ? '☆' : '☆') }}
          </span>
        </div>
      </div>
      <p class="text-brown/70 mb-4">{{ product.description }}</p>
      <div class="flex justify-between items-center">
        <span class="text-2xl font-bold text-soft-orange">₱{{ product.price.toFixed(2) }}</span>
        <button
          (click)="addToCart.emit(product)"
          [disabled]="!product.inStock"
          class="bg-brown text-white px-4 py-2 rounded-lg hover:bg-brown/80 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          {{ product.inStock ? 'Add to Cart' : 'Out of Stock' }}
        </button>
      </div>
    </div>
  </div>
</div>
