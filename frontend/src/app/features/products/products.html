<div class="products">
  <section class="hero">
    <div class="hero-copy">
      <h1>Products</h1>
      <p class="lede">
        Browse the current menu, narrow it by category, and jump straight into the items that matter.
      </p>
    </div>

    <div class="hero-metrics">
      <div class="metric">
        <span class="metric-value">{{ filteredProducts.length }}</span>
        <span class="metric-label">Visible items</span>
      </div>
      <div class="metric">
        <span class="metric-value">{{ categories.length }}</span>
        <span class="metric-label">Categories</span>
      </div>
      <div class="metric">
        <span class="metric-value">{{ getCategoryLabel(selectedCategory) }}</span>
        <span class="metric-label">Active filter</span>
      </div>
    </div>
  </section>

  <div class="filters">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="onSearch()"
      placeholder="Search products..."
      class="search"
    />

    <select
      [(ngModel)]="selectedCategory"
      (change)="onCategoryChange($any($event.target).value)"
      class="select"
    >
      <option value="all">All Categories</option>
      <option *ngFor="let c of categories" [value]="c.slug">
        {{ c.name }}
      </option>
    </select>
  </div>

  <div class="tabs">
    <button
      [class.active]="selectedCategory === 'all'"
      (click)="onCategoryChange('all')">
      All
    </button>

    <button
      *ngFor="let c of categories"
      [class.active]="selectedCategory === c.slug"
      (click)="onCategoryChange(c.slug)">
      {{ c.name }}
    </button>
  </div>

  <div *ngIf="isLoading" class="loading">
    Loading products...
  </div>

  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>

  <div class="grid" *ngIf="!isLoading">
    <app-product-card
      *ngFor="let product of filteredProducts"
      [product]="product"
      (add)="addToCart.emit($event)">
    </app-product-card>
  </div>
</div>
