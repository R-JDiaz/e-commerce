<footer id="contact" class="landing-footer" *ngIf="footer$ | async as footer">
  <div class="footer-grid">
    <div>
      <h3>{{ footer.brandName }}</h3>
      <p>{{ footer.description }}</p>
    </div>

    <div *ngFor="let group of footer.groups">
      <h4>{{ group.title }}</h4>
      <ul>
        <li *ngFor="let link of group.links">
          <a [href]="link.href">{{ link.label }}</a>
        </li>
      </ul>
    </div>

    <div>
      <h4>Contact</h4>
      <ul>
        <li>{{ footer.contact.address }}</li>
        <li>{{ footer.contact.phone }}</li>
        <li>{{ footer.contact.email }}</li>
      </ul>
    </div>

    <div>
      <h4>Follow</h4>
      <ul>
        <li *ngFor="let social of footer.socials">
          <a [href]="social.href" rel="noopener noreferrer" target="_blank">{{ social.label }}</a>
        </li>
      </ul>
    </div>
  </div>

  <div class="footer-bottom">
    <p>{{ footer.copyright }}</p>
  </div>
</footer>
