<section class="landing-testimonials">
  <div class="section-head">
    <p class="eyebrow">Testimonials</p>
    <h2>What people say</h2>
  </div>

  <div class="testimonial-grid">
    <article *ngFor="let testimonial of reviewManager.topReviews$ | async" class="testimonial">
      <div class="avatar">{{ testimonial.first_name[0] }}</div>
      <div>
        <h3>{{ testimonial.first_name }} {{ testimonial.last_name }}</h3>
        <p>{{ testimonial.comment }}</p>
      </div>
    </article>
  </div>
</section>
