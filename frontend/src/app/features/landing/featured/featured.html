<section id="featured" class="landing-featured">
  <div class="section-head">
    <p class="eyebrow">Featured</p>
    <h2>“Latest additions</h2>
    <p>
      A rotating look at a few favorites pulled from the catalog.
    </p>
  </div>

  <div class="featured-grid" *ngIf="featuredProducts$ | async as products">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (add)="openShop()">
    </app-product-card>
  </div>
</section>
