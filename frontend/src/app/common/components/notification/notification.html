<div class="notification-container">
  <div class="notification-header">
    <h3>Notifications</h3>
    <span class="badge" *ngIf="notifCount$ | async as unreadCount">
      {{ unreadCount }}
    </span>
  </div>

  <ng-container *ngIf="notifications$ | async as notifications">
    <div class="bulk-actions">
      <button
        type="button"
        (click)="markAllAsRead()"
        [disabled]="notifications.length === 0 || (notifCount$ | async) === 0">
        Mark all
      </button>

      <button
        type="button"
        class="danger"
        (click)="deleteAllNotifications()"
        [disabled]="notifications.length === 0">
        Delete all
      </button>
    </div>

    <div class="notification-list">
      <div *ngIf="notifications.length === 0" class="empty">
        No notifications yet
      </div>

      <div
        *ngFor="let notif of notifications"
        class="notification-item"
        [class.unread]="!notif.is_read">
        <div class="message">
          {{ notif.message }}
        </div>

        <div class="meta">
          <small>{{ notif.created_at | date:'short' }}</small>
        </div>

        <div class="actions">
          <button *ngIf="!notif.is_read" type="button" (click)="markAsRead(notif.id)">
            Mark as read
          </button>

          <button type="button" (click)="deleteNotification(notif.id)">
            Delete
          </button>
        </div>
      </div>
    </div>
  </ng-container>
</div>
