<div class="product-card" (click)="selectProduct(product)">
  <div class="media">
    <img
      [src]="product.image_url || 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1200&q=80'"
      [alt]="product.name">
    <span class="badge" [class.out]="product.stock === 0">
      {{ product.stock > 0 ? 'In stock' : 'Sold out' }}
    </span>
    <span class="media-glow" aria-hidden="true"></span>
  </div>

  <div class="content">
    <div class="header">
      <span class="category">{{ product.category_name }}</span>
      <h3>{{ product.name }}</h3>
    </div>

    <p>{{ product.description }}</p>

    <div class="bottom">
      <div class="meta">
        <span class="price">&#8369;{{ product.price }}</span>
        <span class="stock">{{ product.stock }} left</span>
      </div>

      <button
        type="button"
        (click)="add.emit(product)"
        [disabled]="product.stock === 0">
        {{ product.stock > 0 ? 'Add to Cart' : 'Out of Stock' }}
      </button>
    </div>
  </div>
</div>
