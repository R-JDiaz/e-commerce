<header class="nav-shell" [class.compact]="context !== 'landing'">
  <div class="brand">
    <span class="brand-mark">CD</span>
    <div class="brand-copy">
      <p>Cafe Delight</p>
      <span>{{ brandNote }}</span>
    </div>
  </div>

  <nav class="desktop-links" aria-label="Primary navigation" *ngIf="links.length">
    <ng-container *ngFor="let link of links">
      <a *ngIf="link.route; else externalDesktop" [routerLink]="link.href">{{ link.label }}</a>
      <ng-template #externalDesktop>
        <a [href]="link.href">{{ link.label }}</a>
      </ng-template>
    </ng-container>
  </nav>

  <div class="actions">

    <!-- 🔔 Notification Bell -->
  <div class="notif-wrapper" *ngIf="context !== 'landing'">
    <button class="notif-btn" (click)="toggleNotifications()">
      🔔

      <!-- Badge -->
      <span class="notif-badge" *ngIf="notifCount$ | async as unreadCount">
        {{ unreadCount }}
      </span>
    </button>

    <!-- Dropdown -->
    <div class="notif-dropdown" *ngIf="notifOpen">
      <app-notifications></app-notifications>
    </div>
  </div>

    <button
      *ngIf="links.length"
      type="button"
      class="menu-toggle"
      (click)="toggleMobileMenu()"
      aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a *ngIf="actionLabel" routerLink="/login" class="action-link">{{ actionLabel }}</a>
    <button *ngIf="showLogout" type="button" class="logout" (click)="logout.emit()">Logout</button>
  </div>
</header>

<div class="mobile-links" *ngIf="mobileOpen && links.length">
  <ng-container *ngFor="let link of links">
    <a *ngIf="link.route; else externalMobile" [routerLink]="link.href" (click)="closeMobileMenu()">
      {{ link.label }}
    </a>
    <ng-template #externalMobile>
      <a [href]="link.href" (click)="closeMobileMenu()">{{ link.label }}</a>
    </ng-template>
  </ng-container>
</div>
