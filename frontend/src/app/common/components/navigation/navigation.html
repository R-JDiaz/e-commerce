<header class="nav-shell" [class.compact]="context !== 'landing'">
  <div class="brand">
    <span class="brand-mark">CD</span>
    <div class="brand-copy">
      <p>Cafe Delight</p>
      <span>{{ brandNote }}</span>
    </div>
  </div>

  <nav class="desktop-links" aria-label="Primary navigation" *ngIf="links.length">
    <ng-container *ngFor="let link of links">
      <a
        *ngIf="link.route; else anchorDesktop"
        [routerLink]="link.href"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        [ariaCurrentWhenActive]="'page'"
        (click)="onLinkClick(link)">
        {{ link.label }}
      </a>

      <ng-template #anchorDesktop>
        <a
          [href]="link.href"
          [class.is-active]="isLinkActive(link)"
          [attr.aria-current]="isLinkActive(link) ? 'page' : null"
          (click)="onLinkClick(link)">
          {{ link.label }}
        </a>
      </ng-template>
    </ng-container>
  </nav>

  <div class="actions">
    <div class="notif-wrapper" *ngIf="context !== 'landing'">
      <button class="notif-btn" (click)="toggleNotifications()" aria-label="Toggle notifications">
        <span class="notif-icon">N</span>
        <span class="notif-badge" *ngIf="notifCount$ | async as unreadCount">
          {{ unreadCount }}
        </span>
      </button>

      <div class="notif-dropdown" *ngIf="notifOpen">
        <app-notifications></app-notifications>
      </div>
    </div>

    <button
      *ngIf="links.length"
      type="button"
      class="menu-toggle"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileOpen"
      aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <a *ngIf="actionLabel" routerLink="/login" class="action-link">{{ actionLabel }}</a>
    <button *ngIf="showLogout" type="button" class="logout" (click)="logout.emit()">Logout</button>
  </div>
</header>

<div class="mobile-links" *ngIf="mobileOpen && links.length">
  <ng-container *ngFor="let link of links">
    <a
      *ngIf="link.route; else anchorMobile"
      [routerLink]="link.href"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      [ariaCurrentWhenActive]="'page'"
      (click)="closeMobileMenu()">
      {{ link.label }}
    </a>

    <ng-template #anchorMobile>
      <a
        [href]="link.href"
        [class.is-active]="isLinkActive(link)"
        [attr.aria-current]="isLinkActive(link) ? 'page' : null"
        (click)="onLinkClick(link)">
        {{ link.label }}
      </a>
    </ng-template>
  </ng-container>
</div>
